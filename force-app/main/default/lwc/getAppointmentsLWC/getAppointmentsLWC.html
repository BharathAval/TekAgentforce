<template>
    <lightning-card icon-name="standard:service_appointment">

        <!-- Header -->
        <div class="header">
            👋 Hi
        </div>

        <!-- Account Info -->
        <template if:true={output}>
            <div class="summary">
                <div class="account-name">
                    {output.accountName}
                </div>

                <div class="count">
                    Total Appointments: {output.totalAppointments}
                </div>
            </div>
        </template>

        <!-- Error -->
        <template if:true={showError}>
            <div class="error">
                {error}
            </div>
        </template>

        <!-- Cards -->
        <template if:true={hasAppointments}>
            <div class="card-container">

                <template for:each={appointments} for:item="appt">
                    <div key={appt.Id} class="card">

                        <div class="card-title">
                            {appt.AppointmentNumber}
                        </div>

                        <div class="card-row">
                            <span class="label">Status</span>
                            <span class="value">{appt.Status}</span>
                        </div>

                        <div class="card-row">
                            <span class="label">Start</span>
                            <span class="value">{appt.SchedStartTime}</span>
                        </div>

                        <div class="card-row">
                            <span class="label">End</span>
                            <span class="value">{appt.SchedEndTime}</span>
                        </div>

                    </div>
                </template>

            </div>
        </template>

        <!-- No Records -->
        <template if:true={showNoRecords}>
            <div class="no-records">
                🚫 No Service Appointments Found
            </div>
        </template>

    </lightning-card>
</template>
